model:
  name: ssd
  num_classes: 81  # 80 COCO classes + background

dataset:
  name: coco
  root: ./data/coco
  max_train: 1000
  max_val: 500
  image_size: 300

training:
  epochs: 5
  batch_size: 8
  lr: 0.001
  momentum: 0.9
  weight_decay: 0.0005
  device: cuda

output:
  checkpoint_dir: ./checkpoints/ssd_coco
  results_dir: ./results/ssd_coco
