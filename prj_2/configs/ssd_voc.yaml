model:
  name: ssd
  num_classes: 21  # 20 VOC classes + background

dataset:
  name: voc
  root: ./data/VOCdevkit
  max_train: 500
  max_val: 200
  image_size: 300  # SSD requires 300x300

training:
  epochs: 5
  batch_size: 8
  lr: 0.001
  momentum: 0.9
  weight_decay: 0.0005
  device: cuda

output:
  checkpoint_dir: ./checkpoints/ssd_voc
  results_dir: ./results/ssd_voc
