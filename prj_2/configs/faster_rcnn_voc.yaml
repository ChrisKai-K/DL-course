model:
  name: faster_rcnn
  num_classes: 21  # 20 VOC classes + background

dataset:
  name: voc
  root: ./data
  max_train: 500
  max_val: 200
  image_size: 800

training:
  epochs: 5
  batch_size: 4
  lr: 0.005
  momentum: 0.9
  weight_decay: 0.0005
  device: cuda

output:
  checkpoint_dir: ./checkpoints/faster_rcnn_voc
  results_dir: ./results/faster_rcnn_voc
